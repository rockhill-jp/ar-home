<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>いきなりカメラAR + SNSリンク</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script>
      AFRAME.registerComponent('open-link', {
        schema: { url: { default: '' } },
        init: function () {
          this.el.addEventListener('touchstart', () => {
            window.open(this.data.url, '_blank');
          });
        }
      });
    </script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse"
             gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;">
      
      <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
      <a-light type="directional" position="1 2 1" intensity="1"></a-light>

      <a-entity gltf-model="url(hakase_temaneki-v1.glb)" 
                scale="1 1 1" 
                position="0 0 -2">
      </a-entity>
      
      <a-image src="Instagram_logo.png" 
               position="0.5 0.5 -2" 
               width="0.3" height="0.3" 
               open-link="url: https://www.instagram.com/rockhillplants?igsh=b2w1N2h6MHptMjcy&utm_source=qr">
      </a-image>

      <a-image src="youtube_logo.png" 
               position="-0.5 0.5 -2" 
               width="0.3" height="0.3" 
               open-link="url: https://www.youtube.com/@rockhill-jp">
      </a-image>
      
      <a-camera></a-camera>
    </a-scene>
    
  </body>
</html>
