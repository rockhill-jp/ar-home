<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>タップ動作テスト用</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script>
      AFRAME.registerComponent('open-link', {
        schema: { url: { default: '' } },
        init: function () {
          // タップ（クリック）されたら同じ画面のまま遷移
          this.el.addEventListener('click', () => {
            window.location.href = this.data.url;
          });
        }
      });
    </script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" 
             cursor="rayOrigin: mouse;"
             raycaster="objects: .clickable;">
      
      <a-assets>
        <img id="insta-icon" src="Instagram_logo.png">
        <img id="yt-icon" src="youtube_logo.png">
      </a-assets>

      <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
      
      <a-entity position="0.5 0.5 -2">
        <a-image src="#insta-icon" width="0.3" height="0.3"></a-image>
        <a-plane class="clickable" width="1" height="1" 
                 material="opacity: 0; transparent: true" 
                 open-link="url: https://www.instagram.com/rockhillplants?igsh=b2w1N2h6MHptMjcy&utm_source=qr">
        </a-plane>
      </a-entity>

      <a-entity position="-0.5 0.5 -2">
        <a-image src="#yt-icon" width="0.3" height="0.3"></a-image>
        <a-plane class="clickable" width="1" height="1" 
                 material="opacity: 0; transparent: true" 
                 open-link="url: https://www.youtube.com/@rockhill-jp">
        </a-plane>
      </a-entity>
      
      <a-camera></a-camera>
    </a-scene>
    
  </body>
</html>
