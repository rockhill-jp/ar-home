<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>いきなりカメラAR + SNSリンク</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script>
      AFRAME.registerComponent('open-link', {
        schema: { url: { default: '' } },
        init: function () {
          // スマホでのタップ用
          this.el.addEventListener('touchstart', () => {
            window.open(this.data.url, '_blank');
          });
          // 念のためPCブラウザ等のクリック用も残します
          this.el.addEventListener('click', () => {
            window.open(this.data.url, '_blank');
          });
        }
      });
    </script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" 
             cursor="rayOrigin: mouse"
             gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/;">
      
      <a-assets>
        <a-asset-item id="hakase-model" src="hakase_temaneki-v1.glb"></a-asset-item>
        <img id="insta-icon" src="Instagram_logo.png">
        <img id="yt-icon" src="youtube_logo.png">
      </a-assets>

      <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
      <a-light type="directional" position="1 2 1" intensity="1"></a-light>

      <a-entity gltf-model="#hakase-model" 
                scale="1 1 1" 
                position="0 0 -2">
      </a-entity>
      
      <a-image src="#insta-icon" 
               position="0.5 0.5 -2" 
               width="0.3" height="0.3" 
               open-link="url: https://www.instagram.com/rockhillplants?igsh=b2w1N2h6MHptMjcy&utm_source=qr">
      </a-image>

      <a-image src="#yt-icon" 
               position="-0.5 0.5 -2" 
               width="0.3" height="0.3" 
               open-link="url: https://www.youtube.com/@rockhill-jp">
      </a-image>
      
      <a-camera></a-camera>
    </a-scene>
    
  </body>
</html>
