<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AR HOME + SNSリンク</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>
    
    <script>
      AFRAME.registerComponent('open-link', {
        schema: { url: { default: '' } },
        init: function () {
          this.el.addEventListener('click', () => {
            window.location.href = this.data.url;
          });
        }
      });
    </script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" 
             cursor="rayOrigin: mouse;"
             raycaster="objects: .clickable; interval: 100;"
             gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/;">
      
      <a-assets>
        <a-asset-item id="hakase-model" src="https://rockhill-jp.github.io/ar-home/hakase_temaneki-v1-light.glb?v=100"></a-asset-item>
        <img id="insta-icon" src="Instagram_logo.png">
        <img id="yt-icon" src="youtube_logo.png">
        <img id="x-icon" src="x_logo.png">
        <img id="base-icon" src="base_logo.png">
        <img id="threads-icon" src="threads_logo.png">
        <img id="pa-icon" src="plants_ar_logo.png">
      </a-assets>

      <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
      <a-light type="directional" position="1 2 1" intensity="1"></a-light>
      
      <a-entity gltf-model="#hakase-model" 
                scale="0.32 0.32 0.32" 
                position="0 0.3 -2"
                animation-mixer="clip: *;">
      </a-entity>
      
      <a-entity position="0.4 1.0 -2">
        <a-image src="#insta-icon" width="0.3" height="0.3"></a-image>
        <a-plane class="clickable" width="0.5" height="0.5" position="0 0 0.1" material="opacity: 0; transparent: true" 
                 open-link="url: https://www.instagram.com/rockhillplants?igsh=b2w1N2h6MHptMjcy&utm_source=qr"></a-plane>
      </a-entity>

      <a-entity position="-0.4 1.0 -2">
        <a-image src="#yt-icon" width="0.3" height="0.3"></a-image>
        <a-plane class="clickable" width="0.5" height="0.5" position="0 0 0.1" material="opacity: 0; transparent: true" 
                 open-link="url: https://www.youtube.com/@rockhill-jp"></a-plane>
      </a-entity>

      <a-entity position="0.4 0.5 -2">
        <a-image src="#x-icon" width="0.3" height="0.3"></a-image>
        <a-plane class="clickable" width="0.5" height="0.5" position="0 0 0.1" material="opacity: 0; transparent: true" 
                 open-link="url: https://x.com/rockhilljapan?s=21&t=uYQ5pHasPAQtFJYw6d434Q"></a-plane>
      </a-entity>

      <a-entity position="-0.4 0.5 -2">
        <a-image src="#base-icon" width="0.3" height="0.3"></a-image>
        <a-plane class="clickable" width="0.5" height="0.5" position="0 0 0.1" material="opacity: 0; transparent: true" 
                 open-link="url: https://rockhill.official.ec"></a-plane>
      </a-entity>

      <a-entity position="0.4 0.0 -2">
        <a-image src="#threads-icon" width="0.3" height="0.3"></a-image>
        <a-plane class="clickable" width="0.5" height="0.5" position="0 0 0.1" material="opacity: 0; transparent: true" 
                 open-link="url: https://www.threads.com/@rockhillplants?igshid=NTc4MTIwNjQ2YQ=="></a-plane>
      </a-entity>

      <a-entity position="-0.4 0.0 -2">
        <a-image src="#pa-icon" width="0.3" height="0.3"></a-image>
        <a-plane class="clickable" width="0.5" height="0.5" position="0 0 0.1" material="opacity: 0; transparent: true" 
                 open-link="url: https://rockhill-jp.github.io/ar-plants/"></a-plane>
      </a-entity>
      
      <a-camera></a-camera>
    </a-scene>
    
  </body>
</html>
